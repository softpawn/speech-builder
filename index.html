  <!-- 전체화면 앱 스타일 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm: #f0e8d8;
    --gold: #c8973a;
    --deep: #2c2416;
    --mid: #5c4a2a;
    --light: #9c8060;
    --green: #3d6b4f;
    --green-light: #eef4f0;
    --red: #8b3a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* 홈 화면 앱 모드에서 상태바 영역 처리 */
  #screen-topic {
    padding-top: max(60px, env(safe-area-inset-top));
  }
  .select-header, .speech-header {
    padding-top: max(24px, env(safe-area-inset-top));
  }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── SCREEN 1: TOPIC SELECT ── */
  #screen-topic {
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 60px 20px;
    background: var(--deep);
    position: relative;
    overflow: hidden;
  }
  #screen-topic.active { display: flex; }

  #screen-topic::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,151,58,0.15), transparent 70%);
    pointer-events: none;
  }
  #screen-topic::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,107,79,0.2), transparent 70%);
    pointer-events: none;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 12px;
    animation: fadeUp 0.8s ease both;
  }

  .app-subtitle {
    color: var(--light);
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 60px;
    animation: fadeUp 0.8s 0.15s ease both;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    max-width: 800px;
    width: 100%;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .topic-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,151,58,0.25);
    border-radius: 16px;
    padding: 32px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .topic-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,151,58,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .topic-card:hover::before { opacity: 1; }
  .topic-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(200,151,58,0.2);
  }

  .topic-icon { font-size: 2.5rem; margin-bottom: 16px; display: block; }
  .topic-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: #fff;
    margin-bottom: 8px;
  }
  .topic-verse {
    font-size: 0.78rem;
    color: var(--light);
    line-height: 1.5;
  }

  /* ── SCREEN 2: SENTENCE SELECT ── */
  #screen-select {
    padding: 0;
  }

  .select-header {
    background: var(--deep);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(200,151,58,0.2);
  }

  .back-btn {
    background: none;
    border: 1px solid rgba(200,151,58,0.4);
    color: var(--gold);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(200,151,58,0.1); }

  .header-info { flex: 1; }
  .header-topic {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #fff;
  }
  .header-verse {
    font-size: 0.75rem;
    color: var(--light);
    margin-top: 2px;
    font-style: italic;
  }

  .complete-btn {
    background: var(--gold);
    color: var(--deep);
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .complete-btn:hover { background: #d9a848; transform: scale(1.03); }
  .complete-btn:disabled { background: #888; cursor: not-allowed; transform: none; }

  .progress-bar {
    height: 3px;
    background: rgba(200,151,58,0.15);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #e8b860);
    transition: width 0.4s ease;
  }

  .select-body {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .verse-card {
    background: linear-gradient(135deg, var(--green), #2d5038);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .verse-card::before {
    content: '"';
    position: absolute;
    top: -10px; left: 16px;
    font-size: 8rem;
    font-family: 'Playfair Display', serif;
    color: rgba(255,255,255,0.08);
    line-height: 1;
    pointer-events: none;
  }
  .verse-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);

  }
  .verse-text {

  .section-block {

  .section-header {

  .section-num {

    flex-shrink: 0;

  .section-title {

    font-size: 1.1rem;
    color: var(--deep);

  .section-ko {
    font-size: 0.78rem;
    color: var(--light);

  .section-hint {

  .sentence-list {

  }

  .sentence-item {

    align-items: flex-start;

  }
  .sentence-item:hover {
    border-color: var(--gold);

  .sentence-item.selected {
    border-color: var(--green);
    background: var(--green-light);
  }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid #ccc;
    border-radius: 6px;
    flex-shrink: 0;

    transition: all 0.2s;
    background: #fff;
  }
  .sentence-item.selected .checkbox {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .checkbox::after {
    content: '✓';
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .sentence-item.selected .checkbox::after { opacity: 1; }

  .sentence-text {
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--deep);
  }
  .sentence-item.selected .sentence-text { color: var(--green); font-weight: 500; }

  /* ── SCREEN 3: SPEECH DISPLAY ── */
  #screen-speech {
    background: var(--cream);
  }

  .speech-header {
    background: var(--deep);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .speech-header .header-topic { font-size: 1.2rem; }

  .speech-body {
    max-width: 700px;
    margin: 0 auto;
    padding: 50px 24px 80px;
  }

  .speech-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--deep);

  .speech-meta {

  }

  .speech-section {

  .speech-section-label {

  .speech-sentences p {

  .btn-outline {
    flex: 1;
    background: none;
    border: 2px solid var(--gold);

  .btn-solid {

    padding: 14px;
    border-radius: 12px;

    font-size: 0.9rem;
    font-weight: 500;

    transition: all 0.2s;

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;

    background: var(--deep);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 0.85rem;
    border-left: 4px solid var(--red);
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RECORDER ── */
  .recorder-panel {
    background: var(--deep);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .recorder-panel::before {
    content: '';
    position: absolute;
    inset: 0;

  }

  .recorder-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 18px;
  }

  .recorder-main {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .rec-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    transition: all 0.2s ease;
    position: relative;
  }
  .rec-btn-idle {
    background: var(--red);
    box-shadow: 0 4px 20px rgba(139,58,42,0.5);
  }
  .rec-btn-idle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(139,58,42,0.7);
  }
  .rec-btn-recording {
    background: #c0392b;
    animation: recPulse 1.4s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.6); }
    50% { box-shadow: 0 0 0 14px rgba(192,57,43,0); }
  }

  .recorder-info { flex: 1; }

  .rec-status {
    font-size: 0.88rem;
    color: #fff;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: none;
  }
  .rec-dot.active {
    display: block;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .rec-timer {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 10px;
  }

  /* Waveform bars */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: rgba(200,151,58,0.3);
    height: 6px;
    transition: height 0.1s ease;
  }
  .waveform.active .wave-bar {
    animation: waveAnim 0.8s ease-in-out infinite;
    background: var(--gold);
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { animation-delay: 0.05s; }
  .wave-bar:nth-child(7) { animation-delay: 0.25s; }
  .wave-bar:nth-child(8) { animation-delay: 0.35s; }
  .wave-bar:nth-child(9) { animation-delay: 0.1s; }
  .wave-bar:nth-child(10) { animation-delay: 0.2s; }
  .wave-bar:nth-child(11) { animation-delay: 0.4s; }
  .wave-bar:nth-child(12) { animation-delay: 0.05s; }
  @keyframes waveAnim {
    0%, 100% { height: 4px; }
    50% { height: 28px; }
  }

  /* Playback row */
  .playback-row {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: none;
  }
  .playback-row.visible { display: block; }

  .playback-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 12px;
  }

  .playback-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .play-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: none;
    color: var(--gold);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .play-btn:hover { background: rgba(200,151,58,0.12); }
  .play-btn.playing {
    background: var(--gold);
    color: var(--deep);
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .progress-played {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }
  .progress-played::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
  }

  .play-time {
    font-size: 0.78rem;
    color: var(--light);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
  }

  .export-btn {
    background: rgba(200,151,58,0.12);
    border: 1px solid rgba(200,151,58,0.35);
    color: var(--gold);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .export-btn:hover { background: rgba(200,151,58,0.22); }

  @media print {
    .speech-header, .speech-actions, .recorder-panel { display: none; }
    .speech-body { padding: 20px; max-width: 100%; }
  }

  /* ── SHADOWING SCREEN ── */
  .sh-header {
    background: var(--deep);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(200,151,58,0.2);
  }

  .sh-progress-bar {
    height: 3px;
    background: rgba(61,107,79,0.2);
  }
  .sh-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #5a9e72);
    transition: width 0.4s ease;
  }

  .sh-progress-text {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    white-space: nowrap;
  }

  .sh-body {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* Speed slider */
  .sh-speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    background: #fff;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid #e8e0d0;
  }
  .sh-speed-label { font-size: 1.1rem; }
  .sh-speed-slider {
    flex: 1;
    accent-color: var(--green);
    height: 4px;
    cursor: pointer;
  }
  .sh-speed-val {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  /* Sentence card */
  .sh-card {
    background: var(--deep);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 28px;
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(44,36,22,0.15);
  }

  .sh-section-badge {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
  }

  .sh-sentence {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    color: #fff;
    line-height: 1.6;
  }

  /* Steps */
  .sh-steps {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .sh-step {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    border: 2px solid #e8e0d0;
    transition: border-color 0.2s;
  }
  .sh-step.active { border-color: var(--green); }

  .sh-step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #e8e0d0;
    color: var(--light);
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sh-step-num.active-step {
    background: var(--green);
    color: #fff;
  }
  .sh-step-num.done-step {
    background: var(--gold);
    color: var(--deep);
  }

  .sh-step-content { flex: 1; }
  .sh-step-title {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 10px;
  }

  /* Action buttons */
  .sh-action-btn {
    padding: 9px 18px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .listen-btn {
    background: var(--deep);
    color: var(--gold);
    border: 2px solid rgba(200,151,58,0.3);
  }
  .listen-btn:hover { background: var(--mid); }
  .listen-btn.playing { background: var(--gold); color: var(--deep); }

  .record-btn {
    background: var(--red);
    color: #fff;
  }
  .record-btn:hover { opacity: 0.88; }
  .record-btn.recording {
    animation: recPulse 1.4s ease-in-out infinite;
  }

  .sh-timer {
    font-size: 0.82rem;
    color: var(--red);
    font-weight: 700;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .sh-compare-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tts-play-btn {
    background: var(--deep);
    color: var(--gold);
    border: 2px solid rgba(200,151,58,0.3);
  }
  .tts-play-btn:hover { background: var(--mid); }

  .my-play-btn {
    background: var(--green);
    color: #fff;
  }
  .my-play-btn:hover { opacity: 0.88; }

  .save-btn {
    background: rgba(200,151,58,0.12);
    color: var(--gold);
    border: 1px solid rgba(200,151,58,0.35);
  }
  .save-btn:hover { background: rgba(200,151,58,0.22); }

  .sh-compare-placeholder {
    font-size: 0.8rem;
    color: #bbb;
    font-style: italic;
  }

  /* Navigation */
  .sh-nav {
    display: flex;
    gap: 12px;
  }
  .sh-nav-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: none;
    border: 2px solid #e8e0d0;
    color: var(--mid);
  }
  .sh-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .sh-nav-next {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .sh-nav-next:hover { opacity: 0.88; background: var(--green); }
  .sh-nav-next:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

  /* Shadowing button in speech screen */
  .btn-shadowing {
    flex: 1;
    background: var(--green);
    border: 2px solid var(--green);
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-shadowing:hover { opacity: 0.88; }

  /* Topic card shadowing entry */
  .shadowing-entry {
    margin-top: 10px;
    font-size: 0.76rem;
    color: var(--green);
    cursor: pointer;
    text-decoration: underline;
    display: block;
  }

</style>

<body>

<!-- SCREEN 1: TOPIC -->
<div id="screen-topic" class="screen active">
  <p class="app-subtitle">English Speech Builder</p>
  <h1 class="app-title">What will you<br>speak about today?</h1>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- SCREEN 2: SELECT -->
<div id="screen-select" class="screen">
  <div class="select-header">
    <button class="back-btn" onclick="goBack('select')">←</button>
    <div class="header-info">
      <div class="header-topic" id="sel-topic-name"></div>
      <div class="header-verse" id="sel-verse-ref"></div>
    </div>
    <button class="complete-btn" id="complete-btn" onclick="showSpeech()">완성하기 →</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="select-body">
    <div class="verse-card">
      <div class="verse-label">📖 이번 달 말씀</div>
      <div class="verse-text" id="sel-verse-text"></div>
      <div class="verse-ref" id="sel-verse-ref2"></div>
    </div>
    <div id="sections-container"></div>
  </div>
</div>

<!-- SCREEN 3: SPEECH -->
<div id="screen-speech" class="screen">
  <div class="speech-header">
    <button class="back-btn" onclick="goBack('speech')">←</button>
    <div class="header-info">
      <div class="header-topic" id="sp-topic-name"></div>
      <div class="header-verse" id="sp-verse-ref">완성된 스피치 원고</div>
    </div>
  </div>
  <div class="speech-body">
    <h2 class="speech-title">My Speech</h2>
    <div class="speech-meta" id="sp-meta"></div>

    <!-- RECORDER PANEL -->
    <div class="recorder-panel">
      <div class="recorder-label">🎙 녹음하기</div>
      <div class="recorder-main">
        <button class="rec-btn rec-btn-idle" id="rec-btn" onclick="toggleRecording()">🎙</button>
        <div class="recorder-info">
          <div class="rec-status">
            <div class="rec-dot" id="rec-dot"></div>
            <span id="rec-status-text">준비됨 — 버튼을 눌러 녹음 시작</span>
          </div>
          <div class="rec-timer" id="rec-timer">0:00</div>
          <div class="waveform" id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
          </div>
        </div>
      </div>

      <!-- PLAYBACK -->
      <div class="playback-row" id="playback-row">
        <div class="playback-label">녹음된 스피치</div>
        <div class="playback-controls">
          <button class="play-btn" id="play-btn" onclick="togglePlayback()">▶</button>
          <div class="progress-track" id="progress-track" onclick="seekAudio(event)">
            <div class="progress-played" id="progress-played"></div>

// ── RECORDER (WAV output) ──────────────────────────────
let mediaRecorder = null;
let audioChunks = [];
let wavBlob = null;       // final WAV for playback & export
let audioContext = null;  // for WAV conversion
let audioEl = null;
let recInterval = null;
let recSeconds = 0;
let isRecording = false;

function fmtTime(s) {
  const sec = Math.max(0, Math.floor(s));
  return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
}

// ── WAV encoder (pure JS) ──────────────────────────────
function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  const writeStr = (off, str) => { for (let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + samples.length*2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);   // PCM
  view.setUint16(20, 1, true);    // PCM format
  view.setUint16(22, 1, true);    // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); // byte rate
  view.setUint16(32, 2, true);    // block align
  view.setUint16(34, 16, true);   // bits per sample
  writeStr(36, 'data');
  view.setUint32(40, samples.length*2, true);
  // clamp & write 16-bit PCM
  let off = 44;
  for (let i=0; i<samples.length; i++, off+=2) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s*0x8000 : s*0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

async function convertToWAV(chunks, mimeType) {
  const raw = new Blob(chunks, { type: mimeType });
  const arrayBuf = await raw.arrayBuffer();
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  if (audioContext.state === 'suspended') await audioContext.resume();
  const decoded = await audioContext.decodeAudioData(arrayBuf);
  // mix down to mono
  const len = decoded.length;
  const sampleRate = decoded.sampleRate;
  const mono = new Float32Array(len);
  for (let ch=0; ch<decoded.numberOfChannels; ch++) {
    const data = decoded.getChannelData(ch);
    for (let i=0; i<len; i++) mono[i] += data[i];
  }
  if (decoded.numberOfChannels > 1) {
    for (let i=0; i<len; i++) mono[i] /= decoded.numberOfChannels;
  }
  return encodeWAV(mono, sampleRate);
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    if (wavBlob) {
      if (!confirm('기존 녹음이 있습니다. 새로 녹음하면 기존 녹음이 삭제됩니다. 계속하시겠습니까?')) return;
      resetPlayback();
    }
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4','']
      .find(m => !m || MediaRecorder.isTypeSupported(m)) || '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('rec-status-text').textContent = 'WAV 변환 중...';
      try {
        wavBlob = await convertToWAV(audioChunks, mediaRecorder.mimeType || 'audio/webm');
        setupPlayback(wavBlob);
      } catch(e) {
        // fallback: use raw blob if WAV conversion fails
        console.warn('WAV conversion failed, using raw:', e);
        wavBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        setupPlayback(wavBlob);
      }
    };

    mediaRecorder.start(100);
    isRecording = true;
    recSeconds = 0;

    document.getElementById('rec-btn').className = 'rec-btn rec-btn-recording';
    document.getElementById('rec-btn').textContent = '⏹';
    document.getElementById('rec-dot').classList.add('active');
    document.getElementById('rec-status-text').textContent = '녹음 중...';
    document.getElementById('waveform').classList.add('active');

    recInterval = setInterval(() => {
      recSeconds++;
      document.getElementById('rec-timer').textContent = fmtTime(recSeconds);
    }, 1000);

  } catch (err) {
    showToast('마이크 권한이 필요합니다. 브라우저 설정에서 허용해주세요.');
    console.error(err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(recInterval);
  isRecording = false;

  document.getElementById('rec-btn').className = 'rec-btn rec-btn-idle';
  document.getElementById('rec-btn').textContent = '🎙';
  document.getElementById('rec-dot').classList.remove('active');
  document.getElementById('rec-status-text').textContent = '변환 중...';
  document.getElementById('waveform').classList.remove('active');
}

function setupPlayback(blob) {
  const url = URL.createObjectURL(blob);
  audioEl = new Audio(url);
  audioEl.preload = 'auto';

  audioEl.onended = () => {
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('playing');
    document.getElementById('progress-played').style.width = '0%';
  };

  audioEl.ontimeupdate = () => {
    if (!audioEl.duration) return;
    const pct = (audioEl.currentTime / audioEl.duration) * 100;
    document.getElementById('progress-played').style.width = pct + '%';
    document.getElementById('play-time').textContent =
      fmtTime(audioEl.currentTime) + ' / ' + fmtTime(audioEl.duration);
  };

  audioEl.onloadedmetadata = () => {
    document.getElementById('play-time').textContent =
      '0:00 / ' + fmtTime(audioEl.duration);
  };

  document.getElementById('playback-row').classList.add('visible');
  document.getElementById('rec-status-text').textContent = '녹음 완료 — 아래에서 재생하세요 (WAV)';
}

function togglePlayback() {
  if (!audioEl) return;
  if (audioEl.paused) {
    if (audioContext && audioContext.state === 'suspended') audioContext.resume();
    audioEl.play();
    document.getElementById('play-btn').textContent = '⏸';
    document.getElementById('play-btn').classList.add('playing');
  } else {
    audioEl.pause();
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('playing');
  }
}

function seekAudio(e) {
  if (!audioEl || !audioEl.duration) return;
  const rect = document.getElementById('progress-track').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.currentTime = ratio * audioEl.duration;
}

function exportRecording() {
  if (!wavBlob) return;
  const isWav = wavBlob.type === 'audio/wav';
  const ext = isWav ? 'wav' : (wavBlob.type.includes('ogg') ? 'ogg' : wavBlob.type.includes('mp4') ? 'm4a' : 'webm');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(wavBlob);
  const topic = currentTopic ? currentTopic.name.replace(/\s+/g, '_') : 'speech';
  a.download = 'my_speech_' + topic + '.' + ext;
  a.click();
  showToast('녹음 파일을 저장했습니다! (.wav)');
}

function resetPlayback() {
  if (audioEl) { audioEl.pause(); audioEl = null; }
  wavBlob = null;
  document.getElementById('playback-row').classList.remove('visible');
  document.getElementById('progress-played').style.width = '0%';
  document.getElementById('play-time').textContent = '0:00 / 0:00';
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('rec-timer').textContent = '0:00';
  document.getElementById('rec-status-text').textContent = '준비됨 — 버튼을 눌러 녹음 시작';
}

let shSpeed = 0.8;

let shChunks = [];

let shAudioEl = null;
let shRecInterval = null;

// Build sentence list from topic (all sentences) or from selections (speech sentences)
function startShadowing(mode) {
  if (!currentTopic) return;

  shSentences = [];

  if (mode === 'speech') {
    // Only sentences selected for the speech
    currentTopic.sections.forEach((sec, si) => {
      [...selections[si]].sort().forEach(idx => {
        shSentences.push({
          text: sec.sentences[idx],
          sectionTitle: sec.title,
          sectionKo: sec.ko,
          sectionNum: sec.num
        });
      });
    });
  } else {
    // All sentences in the worksheet
    currentTopic.sections.forEach(sec => {
      sec.sentences.forEach(s => {
        shSentences.push({
          text: s,
          sectionTitle: sec.title,
          sectionKo: sec.ko,
          sectionNum: sec.num
        });
      });
    });
  }

  if (shSentences.length === 0) { showToast('문장이 없습니다.'); return; }

  shIndex = 0;
  shSpeed = parseFloat(document.getElementById('sh-speed')?.value || 0.8);
  document.getElementById('sh-topic-name').textContent = currentTopic.name;
  document.getElementById('sh-mode-label').textContent =
    mode === 'speech' ? '내 스피치 문장 셰도잉' : '전체 문장 셰도잉';

  shResetRecState();
  shRenderSentence();
  showScreen('screen-shadowing');
}

function shRenderSentence() {
  const s = shSentences[shIndex];
  const total = shSentences.length;

  document.getElementById('sh-sentence').textContent = s.text;
  document.getElementById('sh-section-badge').textContent =
    s.sectionNum + '. ' + s.sectionTitle + ' (' + s.sectionKo + ')';
  document.getElementById('sh-progress-text').textContent = (shIndex + 1) + ' / ' + total;
  document.getElementById('sh-progress-fill').style.width = ((shIndex + 1) / total * 100) + '%';

  // Nav buttons
  document.getElementById('sh-prev-btn').disabled = shIndex === 0;
  const nextBtn = document.getElementById('sh-next-btn');
  nextBtn.textContent = shIndex === total - 1 ? '완료 ✓' : '다음 →';

  // Reset step states
  shResetRecState();
  shSetStepActive(1);
}

function shSetStepActive(stepNum) {
  [1, 2, 3].forEach(n => {
    const step = document.getElementById('sh-step-' + ['listen','record','compare'][n-1]);
    const numEl = step?.querySelector('.sh-step-num');
    if (!step || !numEl) return;
    step.classList.remove('active');
    numEl.classList.remove('active-step', 'done-step');
    if (n < stepNum) numEl.classList.add('done-step');
    else if (n === stepNum) { step.classList.add('active'); numEl.classList.add('active-step'); }
  });
}

function updateSpeed(val) {
  shSpeed = parseFloat(val);
  document.getElementById('sh-speed-val').textContent = shSpeed.toFixed(1) + 'x';
}

// ── TTS ──
function playSentenceTTS() {
  if (!window.speechSynthesis) { showToast('이 브라우저는 TTS를 지원하지 않습니다.'); return; }
  speechSynthesis.cancel();

  const btn = document.getElementById('sh-listen-btn');
  const icon = document.getElementById('sh-listen-icon');
  btn.classList.add('playing');
  icon.textContent = '🔊';

  shTtsUtterance = new SpeechSynthesisUtterance(shSentences[shIndex].text);
  shTtsUtterance.lang = 'en-US';
  shTtsUtterance.rate = shSpeed;

  // Try to pick a natural English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US' && !v.name.includes('Google'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) shTtsUtterance.voice = preferred;

  shTtsUtterance.onend = () => {
    btn.classList.remove('playing');
    icon.textContent = '🔊';
    shSetStepActive(2);
  };
  shTtsUtterance.onerror = () => { btn.classList.remove('playing'); };

  speechSynthesis.speak(shTtsUtterance);
  shSetStepActive(1);
}

// ── RECORDING ──
async function toggleShRec() {
  if (shIsRecording) {
    stopShRec();
  } else {
    await startShRec();
  }
}

async function startShRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4','']
      .find(m => !m || MediaRecorder.isTypeSupported(m)) || '';
    shRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    shChunks = [];

    shRecorder.ondataavailable = e => { if (e.data.size > 0) shChunks.push(e.data); };
    shRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      try {
        shWavBlob = await convertToWAV(shChunks, shRecorder.mimeType || 'audio/webm');
      } catch(e) {
        shWavBlob = new Blob(shChunks, { type: shRecorder.mimeType || 'audio/webm' });
      }
      shSetupCompare();
    };

    shRecorder.start(100);
    shIsRecording = true;
    shRecSeconds = 0;

    const btn = document.getElementById('sh-rec-btn');
    btn.classList.add('recording');
    document.getElementById('sh-rec-icon').textContent = '⏹';
    document.getElementById('sh-rec-label').textContent = '정지';
    const timer = document.getElementById('sh-timer');
    timer.style.display = 'block';
    timer.textContent = '0:00';

    shRecInterval = setInterval(() => {
      shRecSeconds++;
      timer.textContent = fmtTime(shRecSeconds);
    }, 1000);

    shSetStepActive(2);
  } catch(err) {
    showToast('마이크 권한이 필요합니다.');
    console.error(err);
  }
}

function stopShRec() {
  if (shRecorder && shRecorder.state !== 'inactive') shRecorder.stop();
  clearInterval(shRecInterval);
  shIsRecording = false;

  const btn = document.getElementById('sh-rec-btn');
  btn.classList.remove('recording');
  document.getElementById('sh-rec-icon').textContent = '🎙';
  document.getElementById('sh-rec-label').textContent = '다시 녹음';
  shSetStepActive(3);
}

function shSetupCompare() {
  const url = URL.createObjectURL(shWavBlob);
  shAudioEl = new Audio(url);
  shAudioEl.preload = 'auto';
  document.getElementById('sh-compare-btns').style.display = 'flex';
  document.getElementById('sh-compare-placeholder').style.display = 'none';
}

function playMyRec() {
  if (!shAudioEl) return;
  if (audioContext && audioContext.state === 'suspended') audioContext.resume();
  shAudioEl.currentTime = 0;
  shAudioEl.play();
}

function saveMyRec() {
  if (!shWavBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(shWavBlob);
  const sentNum = shIndex + 1;
  const topic = currentTopic ? currentTopic.name.replace(/\s+/g,'_') : 'speech';
  a.download = 'shadowing_' + topic + '_s' + sentNum + '.wav';
  a.click();
  showToast('문장 ' + sentNum + ' 녹음을 저장했습니다!');
}

function shResetRecState() {
  if (shIsRecording) { stopShRec(); }
  if (shAudioEl) { shAudioEl.pause(); shAudioEl = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  clearInterval(shRecInterval);
  shIsRecording = false;
  shWavBlob = null;
  shRecSeconds = 0;

  const btn = document.getElementById('sh-rec-btn');
  if (btn) {
    btn.classList.remove('recording');
    document.getElementById('sh-rec-icon').textContent = '🎙';
    document.getElementById('sh-rec-label').textContent = '녹음 시작';
  }
  const timer = document.getElementById('sh-timer');
  if (timer) { timer.style.display = 'none'; timer.textContent = '0:00'; }
  const compareBtns = document.getElementById('sh-compare-btns');
  if (compareBtns) compareBtns.style.display = 'none';
  const placeholder = document.getElementById('sh-compare-placeholder');
  if (placeholder) placeholder.style.display = 'block';
  const listenBtn = document.getElementById('sh-listen-btn');
  if (listenBtn) listenBtn.classList.remove('playing');
}

function shNavigate(dir) {
  const newIdx = shIndex + dir;
  if (newIdx >= shSentences.length) {
    showToast('🎉 셰도잉 완료! 수고하셨습니다.');
    exitShadowing();
    return;
  }
  if (newIdx < 0) return;
  shIndex = newIdx;
  shRenderSentence();
}

function exitShadowing() {
  shResetRecState();
  // Return to where we came from
  if (shSentences.length > 0 && selections && Object.values(selections).some(s => s.size > 0)) {
    showScreen('screen-speech');
  } else {
    showScreen('screen-select');
  }
}

// Preload voices on iOS (must be triggered by user gesture)
window.addEventListener('touchstart', () => {
  if (window.speechSynthesis) speechSynthesis.getVoices();
}, { once: true });

</script>
